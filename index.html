<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR Finance</title>
<meta name="color-scheme" content="dark light" />
<style>
  html,body{margin:0;height:100%;background:#070b18;color:#aab7df;
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
  .wrap{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
  .logo{width:72px;height:72px;border-radius:18px;display:grid;place-items:center;margin:0 auto 14px;
    background:linear-gradient(135deg,#6b35ff,#8e5cff);color:#fff;font:800 28px 'Sora',system-ui,sans-serif;
    box-shadow:0 0 32px rgba(124,77,255,.45)}
  a{color:#9d6bff}
  .links{margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .links a{display:inline-block;padding:10px 16px;border:1px solid #314773;border-radius:12px;
    text-decoration:none;color:#dbe3ff;font-weight:700}
</style>
<script>
/* ============================================================================
   MR Finance — ROTEADOR
   Detecta o dispositivo e direciona:
     • Celular  → mobile.html  (versão mobile isolada)
     • Desktop  → mrfinance.html (versão WEB/DESKTOP, intocada)
   Critério: user-agent móvel OU (tela estreita E suporte a toque).
   Respeita escolha manual via ?v=mobile | ?v=desktop (salva preferência).
   ============================================================================ */
(function () {
  try {
    var qs = new URLSearchParams(location.search);
    var forced = qs.get('v'); // 'mobile' | 'desktop'
    if (forced === 'mobile' || forced === 'desktop') {
      try { localStorage.setItem('mr_view_pref', forced); } catch (e) {}
    }
    var pref = forced || (function () { try { return localStorage.getItem('mr_view_pref'); } catch (e) { return null; } })();

    var ua = navigator.userAgent || '';
    var uaMobile = /Android|iPhone|iPod|Windows Phone|webOS|BlackBerry|Opera Mini|IEMobile/i.test(ua);
    var iPad = /iPad/i.test(ua) || (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
    var touch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    var narrow = Math.min(window.innerWidth, window.innerHeight) <= 820;

    var isMobile;
    if (pref === 'mobile') isMobile = true;
    else if (pref === 'desktop') isMobile = false;
    else isMobile = (uaMobile && !iPad) || (touch && narrow);

    location.replace(isMobile ? 'mobile.html' : 'mrfinance.html');
  } catch (e) {
    // fallback seguro: vai para o desktop
    location.replace('mrfinance.html');
  }
})();
</script>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="logo">MR</div>
      <p>Carregando o MR Finance…</p>
      <noscript><p>Ative o JavaScript para continuar.</p></noscript>
      <div class="links">
        <a href="mrfinance.html?v=desktop">Versão desktop</a>
        <a href="mobile.html?v=mobile">Versão mobile</a>
      </div>
    </div>
  </div>
</body>
</html>
