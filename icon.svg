<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MR Finance">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b35ff"/>
      <stop offset="1" stop-color="#8e5cff"/>
    </linearGradient>
  </defs>
  <!-- fundo full-bleed (compatível com ícone maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- barras ascendentes (motivo financeiro), dentro da zona segura -->
  <g fill="#ffffff" opacity="0.16">
    <rect x="150" y="320" width="34" height="58" rx="8"/>
    <rect x="200" y="292" width="34" height="86" rx="8"/>
    <rect x="250" y="256" width="34" height="122" rx="8"/>
    <rect x="300" y="212" width="34" height="166" rx="8"/>
  </g>
  <!-- monograma MR -->
  <text x="256" y="252" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="172" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-8">MR</text>
</svg>
