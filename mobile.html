<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#7c4dff"/>
<meta name="color-scheme" content="dark"/>
<title>MR Finance</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="mobile.css"/>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="topbar">
      <button id="menuBtn" class="icon-btn" aria-label="Menu">☰</button>
      <h1 id="pageTitle">MR Finance</h1>
      <button id="themeBtn" class="icon-btn" aria-label="Tema">🌙</button>
    </header>

    <!-- Page containers -->
    <main id="pages">
      <section id="page-visao" class="page active"></section>
      <section id="page-fluxo" class="page"></section>
      <section id="page-transacoes" class="page"></section>
      <section id="page-lancamentos" class="page"></section>
      <section id="page-mais" class="page"></section>
      <!-- Sub-pages (navegadas via stack) -->
      <section id="page-categorias" class="page"></section>
      <section id="page-metas" class="page"></section>
      <section id="page-analises" class="page"></section>
      <section id="page-relatorios" class="page"></section>
      <section id="page-destino" class="page"></section>
      <section id="page-patrimonio" class="page"></section>
      <section id="page-bancos" class="page"></section>
      <section id="page-conciliacao" class="page"></section>
      <section id="page-config" class="page"></section>
    </main>

    <!-- Bottom navigation -->
    <nav id="bottomnav">
      <button class="bn-item active" data-page="visao">
        <span class="bn-icon">📊</span>
        <span class="bn-label">Início</span>
      </button>
      <button class="bn-item" data-page="fluxo">
        <span class="bn-icon">💰</span>
        <span class="bn-label">Fluxo</span>
      </button>
      <button class="bn-item" data-page="transacoes">
        <span class="bn-icon">📋</span>
        <span class="bn-label">Transações</span>
      </button>
      <button class="bn-item" data-page="lancamentos">
        <span class="bn-icon">📅</span>
        <span class="bn-label">Lançamentos</span>
      </button>
      <button class="bn-item" data-page="mais">
        <span class="bn-icon">☰</span>
        <span class="bn-label">Mais</span>
      </button>
    </nav>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Modal container -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div id="modalContent" class="modal-sheet"></div>
    </div>
  </div>

  <script type="module" src="mobile.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
